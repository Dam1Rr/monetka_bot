server:
  port: ${PORT:8080}

spring:
  application:
    name: monetka-bot

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/monetka}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

telegram:
  bot:
    token: ${BOT_TOKEN}
    username: ${BOT_USERNAME}
    webhook-url: ${WEBHOOK_URL}         # e.g. https://monetka-bot.up.railway.app
    admin-ids: ${ADMIN_IDS:}            # comma-separated Telegram IDs of admins

logging:
  level:
    com.monetka: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
