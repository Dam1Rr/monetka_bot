server:
  port: ${PORT:8080}

spring:
  application:
    name: monetka-bot

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/monetka}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
      connection-timeout: 20000
      initialization-fail-timeout: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    connect-retries: 5
    connect-retries-interval: 5
    validate-on-migrate: false

  jackson:
    time-zone: Asia/Bishkek
    serialization:
      write-dates-as-timestamps: false

telegram:
  bot:
    token: ${BOT_TOKEN:changeme}
    username: ${BOT_USERNAME:changeme}
    webhook-url: ${WEBHOOK_URL:http://localhost:8080}
    admin-ids: ${ADMIN_IDS:}

spring.task.scheduling.pool.size: 2

logging:
  level:
    com.monetka: INFO
    org.springframework.web: WARN
    org.hibernate.SQL: WARN
    org.flywaydb: INFO